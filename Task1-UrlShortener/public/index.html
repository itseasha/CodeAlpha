<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔗 URL Shortener | DecodeLabs</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      color: white;
      margin-bottom: 40px;
      padding: 40px 20px;
    }

    .header h1 {
      font-size: 3rem;
      margin-bottom: 10px;
    }

    .header p {
      font-size: 1.2rem;
      opacity: 0.9;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      margin-bottom: 30px;
    }

    .input-group {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
    }

    .input-group input {
      flex: 1;
      padding: 18px;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      font-size: 16px;
      transition: all 0.3s;
    }

    .input-group input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .btn {
      padding: 18px 35px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      transition: all 0.3s;
    }

    .btn:hover {
      background: #5a67d8;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }

    .btn-primary {
      background: #667eea;
    }

    .btn-success {
      background: #10b981;
    }

    .btn-success:hover {
      background: #059669;
    }

    .btn-danger {
      background: #ef4444;
    }

    .btn-danger:hover {
      background: #dc2626;
    }

    .result-card {
      background: #f0fdf4;
      border: 2px solid #86efac;
      border-radius: 12px;
      padding: 20px;
      margin-top: 25px;
      display: none;
    }

    .result-card.show {
      display: block;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .short-url-display {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 15px;
      flex-wrap: wrap;
      margin-top: 15px;
      padding: 15px;
      background: white;
      border-radius: 10px;
    }

    .short-url-display a {
      color: #667eea;
      text-decoration: none;
      font-size: 18px;
      word-break: break-all;
    }

    .stats-section {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #ddd;
    }

    .urls-table {
      width: 100%;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #e2e8f0;
    }

    th {
      background: #f8fafc;
      color: #1e293b;
    }

    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    .badge-success {
      background: #d1fae5;
      color: #065f46;
    }

    .loading {
      text-align: center;
      padding: 20px;
      display: none;
    }

    .loading.show {
      display: block;
    }

    .error-message {
      background: #fee2e2;
      color: #dc2626;
      padding: 15px;
      border-radius: 10px;
      margin-top: 15px;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    @media (max-width: 640px) {
      .header h1 { font-size: 2rem; }
      .card { padding: 25px; }
      .input-group { flex-direction: column; }
      .btn { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🔗 URL Shortener</h1>
      <p>Paste your long URL and get a short, shareable link</p>
    </div>

    <div class="card">
      <div class="input-group">
        <input type="url" id="longUrl" placeholder="https://example.com/very/long/url/that/needs/shortening" />
        <button class="btn btn-primary" onclick="shortenUrl()">Shorten URL →</button>
      </div>

      <div id="result" class="result-card">
        <strong>✨ Your shortened URL:</strong>
        <div class="short-url-display">
          <a id="shortLink" href="#" target="_blank"></a>
          <button class="btn btn-success" onclick="copyToClipboard()" style="padding: 10px 20px;">Copy</button>
        </div>
        <div class="stats-section">
          <small id="statsInfo"></small>
        </div>
      </div>

      <div id="loading" class="loading">
        <div>⏳ Processing your request...</div>
      </div>

      <div id="error" class="error-message"></div>
    </div>

    <div class="card">
      <h2 style="margin-bottom: 20px;">📊 Your Shortened URLs</h2>
      <div class="urls-table">
        <table id="urlsTable">
          <thead>
            <tr><th>Short Code</th><th>Original URL</th><th>Clicks</th><th>Created</th><th>Action</th></tr>
          </thead>
          <tbody id="urlsList">
            <tr><td colspan="5" style="text-align: center;">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    // Load all URLs on page load
    loadAllUrls();

    async function shortenUrl() {
      const longUrl = document.getElementById('longUrl').value;
      const resultDiv = document.getElementById('result');
      const errorDiv = document.getElementById('error');
      const loadingDiv = document.getElementById('loading');
      
      if (!longUrl) {
        showError('Please enter a URL');
        return;
      }
      
      loadingDiv.classList.add('show');
      errorDiv.classList.remove('show');
      resultDiv.classList.remove('show');
      
      try {
        const response = await fetch('/api/shorten', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ longUrl })
        });
        
        const data = await response.json();
        loadingDiv.classList.remove('show');
        
        if (data.success) {
          document.getElementById('shortLink').href = data.shortUrl;
          document.getElementById('shortLink').textContent = data.shortUrl;
          document.getElementById('statsInfo').innerHTML = `📊 Short Code: ${data.shortCode} | ${data.isExisting ? 'Already exists ✓' : 'Newly created ✓'}`;
          resultDiv.classList.add('show');
          document.getElementById('longUrl').value = '';
          loadAllUrls(); // Refresh the list
        } else {
          showError(data.error || 'Something went wrong');
        }
      } catch (error) {
        loadingDiv.classList.remove('show');
        showError('Failed to shorten URL. Please try again.');
      }
    }
    
    async function loadAllUrls() {
      try {
        const response = await fetch('/api/urls');
        const urls = await response.json();
        
        const tbody = document.getElementById('urlsList');
        
        if (urls.length === 0) {
          tbody.innerHTML = '<tr><td colspan="5" style="text-align: center;">No URLs yet. Create your first short link!</td></tr>';
          return;
        }
        
        tbody.innerHTML = urls.map(url => `
          <tr>
            <td><span class="badge badge-success">${url.short_code}</span></td>
            <td style="max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;" title="${url.long_url}">${url.long_url.substring(0, 50)}...</td>
            <td>${url.clicks || 0}</td>
            <td>${new Date(url.created_at).toLocaleDateString()}</td>
            <td><button class="btn btn-danger" onclick="deleteUrl('${url.short_code}')" style="padding: 5px 10px; font-size: 12px;">Delete</button></td>
          </tr>
        `).join('');
      } catch (error) {
        console.error('Error loading URLs:', error);
      }
    }
    
    async function deleteUrl(shortCode) {
      if (confirm('Are you sure you want to delete this shortened URL?')) {
        try {
          await fetch(`/api/urls/${shortCode}`, { method: 'DELETE' });
          loadAllUrls();
        } catch (error) {
          console.error('Error deleting URL:', error);
        }
      }
    }
    
    function showError(message) {
      const errorDiv = document.getElementById('error');
      errorDiv.textContent = message;
      errorDiv.classList.add('show');
      setTimeout(() => {
        errorDiv.classList.remove('show');
      }, 3000);
    }
    
    async function copyToClipboard() {
      const link = document.getElementById('shortLink').textContent;
      await navigator.clipboard.writeText(link);
      alert('✅ Copied to clipboard!');
    }
  </script>
</body>
</html>
